name: '➕ feeds/add'
description: Request to add a channel feed into the database
title: 'Add: '
labels: ['feeds:add']

body:
  - type: markdown
    attributes:
      value: |
        Please fill out the issue form as much as you can so we could efficiently process your request.

  - type: input
    id: channel_id
    attributes:
      label: Channel ID
      description: ID of the channel to which this feed belongs
      placeholder: 'France3.fr'
    validations:
      required: true

  - type: input
    id: feed_name
    attributes:
      label: Feed Name
      description: "Unique for this channel feed name in English. For example: `HD`, `East`, `French`, `+1`, etc. May include: `a-z`, `0-9`, `space`, `-`, `!`, `:`, `&`, `.`, `+`, `'`, `/`, `»`, `#`, `%`, `°`, `$`, `@`, `?`, `|`, `¡`"
      placeholder: 'Mediterranee'
    validations:
      required: true

  - type: input
    id: alt_name
    attributes:
      label: Alternative Names (optional)
      description: List of alternative feed names separated by `;`. May contain any characters except `,` and `"`
      placeholder: 'Méditerranée;Mediterranean'

  - type: dropdown
    id: is_main
    attributes:
      label: Main Feed
      description: Indicates if this feed is the main for the channel
      options:
        - 'FALSE'
        - 'TRUE'
    validations:
      required: true

  - type: input
    id: broadcast_area
    attributes:
      label: Broadcast Area
      description: "List of codes describing the broadcasting area of the feed separated by `;`. Any combination of `r/<region_code>`, `c/<country_code>`, `s/<subdivision_code>`, `ct/<city_code>`. A full list of supported codes can be found here: [data/regions.csv](https://github.com/iptv-org/database/blob/master/data/regions.csv), [data/countries.csv](https://github.com/iptv-org/database/blob/master/data/countries.csv), [data/subdivisions.csv](https://github.com/iptv-org/database/blob/master/data/subdivisions.csv), [data/cities.csv](https://github.com/iptv-org/database/blob/master/data/cities.csv)"
      placeholder: 's/FR-IDF'
    validations:
      required: true

  - type: input
    id: timezones
    attributes:
      label: Timezones
      description: List of broadcast time zones separated by `;`. A list of all supported timezones and their codes can be found in [data/timezones.csv](https://github.com/iptv-org/database/blob/master/data/timezones.csv)
      placeholder: 'Europe/Paris'
    validations:
      required: true

  - type: input
    id: languages
    attributes:
      label: Languages
      description: List of languages in which the feed is broadcast separated by `;`. A list of all supported languages and their codes can be found in [data/languages.csv](https://github.com/iptv-org/database/blob/master/data/languages.csv)
      placeholder: 'fra;eng'
    validations:
      required: true

  - type: dropdown
    id: format
    attributes:
      label: Format
      description: Video format of the broadcast
      default: 6
      options:
        - '4320p'
        - '2160p'
        - '1080p'
        - '1080i'
        - '720p'
        - '576p'
        - '576i'
        - '480p'
        - '480i'
        - '360p'
        - '240p'
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Logo
        Description of the logo for this feed

  - type: input
    id: logo_url
    attributes:
      label: Logo URL (optional)
      description: "Logo URL. Supported formats: `PNG`, `JPEG`, `SVG`, `GIF`, `WebP`, `AVIF`, `APNG`. Only URLs with [HTTPS](https://ru.wikipedia.org/wiki/HTTPS) protocol are supported. The link should not be [geo-blocked](https://en.wikipedia.org/wiki/Geo-blocking)"
      placeholder: 'https://example.com/logo.png'

  - type: dropdown
    id: in_use
    attributes:
      label: In Use
      description: Indicates whether the broadcaster is currently using this logo
      options:
        - 'TRUE'
        - 'FALSE'
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags (optional)
      description: "List of keywords describing this version of the logo separated by `;`. May include: `a-z`, `0-9` and `-`."
      placeholder: 'horizontal;white'

  - type: textarea
    attributes:
      label: Notes (optional)
      description: 'Any additional information that will help us process your request more quickly'
